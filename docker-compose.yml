services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crm-core
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      HOST_ENV: postgres
      PASSWORD_ENV: postgres
      JWT_KEY_ENV: cambio132
      AWS_ACCESS_KEY_ID_ENV: ""
      AWS_SECRET_ACCESS_KEY_ENV: ""
      WHATSAPP_ACCESS_TOKEN: ""
      WHATSAPP_WEBHOOK_SECRET: ""
      OPENAI_API_KEY: ""
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      JWT_SECRET_KEY: cambio132
      CRM_CORE_ENDPOINT: http://backend:8080
      CRM_CORE_API_KEY: ""
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: cambio132
      NEXT_API_URL: http://backend:8080
      AWS_S3_BUCKET_NAME: crm-core-attachments
      AWS_REGION: us-east-2
      AWS_ACCESS_KEY_ID: ""
      AWS_SECRET_ACCESS_KEY: ""
    depends_on:
      - backend

volumes:
  postgres_data:
